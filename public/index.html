<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060918" />
    <title>Adhithya Mohan | Full-Stack Developer & Designer</title>
    <meta name="description" content="Adhithya Mohan — Full-Stack Developer, UI/UX Designer, and Photographer based in Kerala, India. Building impactful digital experiences with React, Node.js, Figma, and IoT." />
    <meta name="keywords" content="Adhithya Mohan, Full Stack Developer, React Developer, Figma Designer, IoT, Photographer, Kerala, Portfolio" />
    <meta name="author" content="Adhithya Mohan" />

    <!-- Open Graph -->
    <meta property="og:title" content="Adhithya Mohan | Full-Stack Developer & Designer" />

    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" href="favicon.png" />

    <!-- Google Fonts — optimized with preconnect + display=swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Critical inline styles for instant LCP / prevent FOUC -->
    <style>
      body {
        margin: 0;
        background: #060918;
        color: #F0F4FF;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      /* Inline critical loader frame to reduce CLS */
      .page-loader {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
