<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060918" />
    <title>Adhithya Mohan | Full-Stack Developer & Designer</title>
    <meta name="description" content="Adhithya Mohan — Full-Stack Developer, UI/UX Designer, and Photographer based in Kerala, India. Building impactful digital experiences with React, Node.js, Figma, and IoT." />
    <meta name="keywords" content="Adhithya Mohan, Full Stack Developer, React Developer, Figma Designer, IoT, Photographer, Kerala, Portfolio" />
    <meta name="author" content="Adhithya Mohan" />
    <meta name="google-site-verification" content="nXHbXTdgWRTlc3Q2BeBRp9mlojQVs7Eta8i8xNwM1dQ" />
    <link rel="canonical" href="https://portfolio-adhym.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Adhithya Mohan | Full-Stack Developer & Designer" />
    <meta property="og:description" content="Building impactful digital experiences with code, design, and creativity." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://portfolio-adhym.vercel.app/" />
    <meta property="og:image" content="https://portfolio-adhym.vercel.app/dp.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Adhithya Mohan | Full-Stack Developer & Designer" />
    <meta name="twitter:description" content="Building impactful digital experiences with code, design, and creativity." />
    <meta name="twitter:image" content="https://portfolio-adhym.vercel.app/dp.jpg" />

    <!-- Favicon (smaller ico) -->
    <link rel="icon" href="favicon.ico" />

    <!-- Google Fonts — critical UI fonts only (render-blocking kept minimal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Only load the 3 fonts actually used across the entire UI on first paint (NON-BLOCKING) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" />
    </noscript>
    <!-- Heavy display serifs used ONLY in hero h1 — load non-blocking after page renders -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700;800&family=Playfair+Display:wght@700;800&display=swap"
      rel="preload"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
    </noscript>
    <link rel="preconnect" href="https://api.github.com" crossorigin />
    <link rel="preconnect" href="https://cdn.sanity.io" crossorigin />

    <!-- Critical inline styles for instant LCP / prevent FOUC -->
    <style>
      body {
        margin: 0;
        background: #060918;
        color: #F0F4FF;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      /* Inline critical loader frame to reduce CLS */
      .page-loader {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
    <!-- Model Viewer for AR -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
